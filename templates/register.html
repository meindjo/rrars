{% extends 'base.html' %}
{% block title %}AR24 | Inscription{% endblock %}
{% block content %}
<section class="auth-page">
  <h1 class="ar24-title">Créer un compte</h1>
  <form method="POST" action="{{ url_for('register') }}" class="ar24-card auth-card">
    <div class="form-group">
      <label for="name" class="ar24-label">Nom</label>
      <input id="name" name="name" type="text" placeholder="Votre nom" class="ar24-input" />
    </div>
    <div class="form-group">
      <label for="email" class="ar24-label">Adresse e-mail</label>
      <input id="email" name="email" type="email" placeholder="Ex : monadresse@email.fr" class="ar24-input" required />
    </div>
    <div class="form-group">
      <label for="password" class="ar24-label">Mot de passe</label>
      <input id="password" name="password" type="password" placeholder="Choisissez un mot de passe" class="ar24-input" required />
    </div>
    <div class="submit-row">
      <button type="submit" class="ar24-btn ar24-btn-primary">S'inscrire</button>
    </div>
  </form>
  <div class="auth-links">
    <a href="{{ url_for('login') }}" class="ar24-link">Déjà inscrit ? Se connecter</a>
  </div>
</section>
{% endblock %}
